<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <h2 class="text-center mb-4" style="font-weight:700;letter-spacing:-0.5px;">📚 Library Portal</h2>
                <div class="card shadow-sm">
                    <div class="card-body">

                        <!-- Role Toggle -->
                        <div class="d-flex justify-content-center gap-3 mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="roleToggle" id="roleStudent" value="student" checked>
                                <label class="form-check-label" for="roleStudent">Student</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="roleToggle" id="roleLibrarian" value="librarian">
                                <label class="form-check-label" for="roleLibrarian">Librarian</label>
                            </div>
                        </div>

                        <!-- Student Auth Tabs -->
                        <div id="studentAuthArea">
                            <ul class="nav nav-tabs mb-3" id="authTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Login</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Register</button>
                                </li>
                            </ul>
                            <div class="tab-content" id="authTabsContent">
                                <!-- Student Login -->
                                <div class="tab-pane fade show active" id="login" role="tabpanel">
                                    <form id="studentLoginForm">
                                        <div class="mb-3">
                                            <label class="form-label">Student ID</label>
                                            <input type="text" class="form-control" id="loginStudentId" placeholder="e.g. STU2024001" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="loginPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-primary w-100">Login</button>
                                    </form>
                                </div>
                                <!-- Student Register -->
                                <div class="tab-pane fade" id="register" role="tabpanel">
                                    <form id="registerForm">
                                        <div class="mb-3">
                                            <label class="form-label">Name</label>
                                            <input type="text" class="form-control" id="regName" placeholder="Name" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Student ID</label>
                                            <input type="text" class="form-control" id="regStudentId" placeholder="e.g. STU2024001" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Password</label>
                                            <input type="password" class="form-control" id="regPassword" required>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100">Register</button>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Librarian Auth Area -->
                        <div id="librarianAuthArea" class="d-none">
                            <form id="librarianLoginForm">
                                <div class="mb-3">
                                    <label class="form-label">10-Digit Access Code</label>
                                    <input type="password" class="form-control" id="librarianCode" maxlength="10" placeholder="Enter access code" required>
                                </div>
                                <button type="submit" class="btn btn-success w-100">Login as Librarian</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Custom Alert Modal -->
    <div class="modal fade" id="customAlertModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Notice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="customAlertMessage"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
</html>
